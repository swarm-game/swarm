  dsl: |
    overlay
    [ {terrain: stone}
    , if (x/5 + (-y)/5) % 2 == 0 then {terrain: dirt} else {blank}
    , if (((3 - y) % 20)/11 + ((x + 3) % 20)/11) == 0 then {terrain: grass} else {blank}
    ]
  upperleft: [-5, 3]
  palette:
    'B': [stone, null, base]
    'j': [stone, null, judge]
    'x': [stone]
    'd': [dirt]
    '.': [stone]
    'w': [stone, wall]
