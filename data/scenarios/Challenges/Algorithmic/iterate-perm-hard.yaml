version: 1
name: Permutation Iteration (Hard)
author: Brent Yorgey
description: |
  Repeatedly apply a permutation.
creative: false
objectives:
  - teaser: Sort
    goal:
      - |
        When you went to bed last night, the alphabet was laid out
        neatly in order from A to Z.  But while you slept, someone has
        rearranged the letters!  You briefly consider putting the
        letters back in order, but then you reconsider: what if this
        order is better?  But then you realize that if rearranging the
        letters in this way is better, doing the same rearrangement
        repeatedly will be MUCH better!
      - |
        The operation performed by the mysterious person overnight
        consists of moving the letter in each position to a (possibly)
        new position.  For example, if the letter A is now in the
        third position, that means they took the letter in the first
        position and moved it to the third position.  Your goal is to
        perform the same operation (i.e. taking the letter that is now
        in the first position and moving it to the third position, and
        so on) one million more times.
    condition: |
      judge <- robotNamed "judge";
      as judge {
        has "bitcoin"
      }
robots:
  - name: base
    dir: east
    devices:
      - solar panel
      - dictionary
      - lambda
      - logger
      - treads
      - grabber
      - scanner
      - branch predictor
      - comparator
      - calculator
      - Elmer's glue
      - decoder ring
      - strange loop
      - linotype
      - parsley
      - pigeon coop
      - origami pigeon
      - hyperloop
  - name: judge
    system: true
    dir: east
    display:
      invisible: true
    program: |
      perm <- instant {import "_iterate-perm/judge"; setup};
      import "_iterate-perm/judge"; judge 1000000 perm
solution: |
  import "_iterate-perm/solution"; go 1000000
