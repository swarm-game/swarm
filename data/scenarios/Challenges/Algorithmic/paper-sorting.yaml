version: 1
name: Paper sorting
author: Brent Yorgey
description: |
  Sort a pile of papers
creative: false
objectives:
  - teaser: Sort
    goal:
      - |
        Someone knocked over a stack of papers, and now they are
        hopelessly jumbled all over the floor!
      - |
        The first step is to put the papers back in order.  Each paper
        has a capital letter written on it; you should arrange them in
        alphabetical order from left to right.
    condition: |
      import "_paper-sorting/judge"; judge
robots:
  - name: base
    dir: east
    devices:
      - solar panel
      - dictionary
      - lambda
      - logger
      - treads
      - grabber
      - scanner
      - branch predictor
      - comparator
      - calculator
      - Elmer's glue
      - decoder ring
      - strange loop
    inventory:
  - name: judge
    system: true
    dir: east
    display:
      invisible: true
    program: |
      instant {import "_paper-sorting/setup"; setup}
solution: |
  import "_paper-sorting/solution"; go
known:
  - 'paper: A'
  - 'paper: B'
  - 'paper: C'
  - 'paper: D'
  - 'paper: E'
  - 'paper: F'
  - 'paper: G'
  - 'paper: H'
  - 'paper: I'
  - 'paper: J'
  - 'paper: K'
